services:
  patrimony:
    build:
      context: .
      dockerfile: ./docker/patrimony/prod/php/Dockerfile
    restart: always
    working_dir: /app/public/patrimony
    ports:
      - 8100:80
    volumes:
      - .:/app/public
      - ./docker/patrimony/prod/caddy/Caddyfile:/etc/frankenphp/Caddyfile
      - ./docker/patrimony/prod/php/php.ini:/usr/local/etc/php/php.ini
    networks:
      - ad-network
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.audiodescription_patrimony.rule=Host(`patrimony.corfm.at`)"
      - "traefik.http.routers.audiodescription_patrimony.entrypoints=websecure"
      - "traefik.http.routers.audiodescription_patrimony.middlewares=strip-www"

  drupal:
    restart: always
    build:
      context: .
      dockerfile: docker/drupal/prod/php/Dockerfile
    ports:
      - 8097:80
    working_dir: /app/public/drupal
    environment:
      S3_ACCESS_KEY: 'S3KEY'
      S3_SECRET_KEY: 'S3SECRET'
      S3_ENDPOINT: 'http://s3:9000'
      S3_BUCKET: 'audiodescription'
      S3_REGION: 'us-east-1'
      S3_HOSTNAME: 's3:9000'
      S3_DOMAIN: 'localhost:9000'
      S3_USE_FOR_MAIN_STORAGE: 'TRUE'
      S3_USE_FOR_PUBLIC: 'TRUE'
      S3_USE_FOR_PRIVATE: 'TRUE'
      S3_USE_CUSTOM_HOST: 'TRUE'
      REDIS_HOST: 'redis'
      REDIS_PORT: '6379'
    volumes:
      - .:/app/public
      - ./docker/drupal/prod/caddy/Caddyfile:/etc/frankenphp/Caddyfile
      - ./docker/drupal/prod/php/php.ini:/usr/local/etc/php/php.ini
    depends_on:
      - db
      - s3
      - redis
    networks:
      - ad-network
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.audiodescription.rule=Host(`audiodescription.corfm.at`) || Host(`www.audiodescription.corfm.at`)"
      - "traefik.http.routers.audiodescription.entrypoints=websecure"
      - "traefik.http.routers.audiodescription.middlewares=strip-www"

  db:
    image: postgres:17-bookworm
    restart: always
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./docker/postgres/init-patrimony-db.sh:/docker-entrypoint-initdb.d/init-patrimony-db.sh
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    networks:
      - ad-network

  elasticsearch:
    restart: always
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms2048m -Xmx2048m
    volumes:
      - elastic-data:/usr/share/elasticsearch/data
    networks:
      - ad-network

  s3:
    build:
      context: ./
      dockerfile: ./docker/s3/Dockerfile
    entrypoint: /bin/sh /usr/local/bin/entrypoint.sh
    volumes:
      - s3:/data
      - ./docker/s3/entrypoint.sh:/usr/local/bin/entrypoint.sh:ro
    environment:
      RUSTFS_ACCESS_KEY: 'S3KEY'
      RUSTFS_SECRET_KEY: 'S3SECRET'
      DEFAULT_BUCKETS: 'audiodescription:public'
    ports:
      - '9001:9001'
      - '9000:9000'
    networks:
      - ad-network

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    networks:
      - ad-network

volumes:
  db-data:
  elastic-data:
  s3:

networks:
  ad-network:
  web:
    external: true