grumphp:
    tasks: {
        phpcs: {
           standard: /app/public/symfony/phpcs.xml
        },
        phpmd: {
            report_format: ansi,
            ruleset: [
                '/app/public/patrimony/phpmd.xml'
            ]
        },
        phpstan: {
            configuration: /app/public/patrimony/phpstan.neon
        }
    }
    git_hook_variables:
        EXEC_GRUMPHP_COMMAND: ['docker', 'compose','-f', '../compose.yml', 'exec', '-T', 'php']
